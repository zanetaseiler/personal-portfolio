name: Deploy portfolio to GoDaddy cPanel

on:
  push:
    branches: [main]
    paths:
      - "Personal Portafolio/Personal Portafolio Zaneta Seilerova/**"
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTPS deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: "Personal Portafolio/Personal Portafolio Zaneta Seilerova/"
          server-dir: "/"
          exclude: |
            **/.git*
            **/.git*/**
            **/cgi-bin/**
            **/.well-known/**
